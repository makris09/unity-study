<!DOCTYPE html>

    <style>

        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        .chart-container { 
            position: relative; 
            width: 100%; 
            max-width: 600px; 
            margin-left: auto; 
            margin-right: auto; 
            height: 350px; 
            max-height: 400px; 
            display: flex;
            justify-content: center;
            align-items: center;
        } 
        @media (min-width: 768px) { .chart-container { height: 400px; max-width: 700px; } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .nav-item { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .nav-active { background-color: #e0f2fe; color: #0284c7; border-left-color: #0284c7; font-weight: 700; }
        .nav-item:hover:not(.nav-active) { background-color: #f1f5f9; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-content { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>

                        type: 'doughnut',
                        data: {
                            labels: rawLabels,
                            datasets: [{
                                data: [20, 20, 20, 20, 20],
                                backgroundColor: bgColors,
                                borderWidth: 0,
                                hoverOffset: 10
                            }]

                <div class="max-w-4xl mx-auto p-6 md:p-10 pb-20">
                    <header class="mb-10">
                        <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">${content.title}</h2>
                        <p class="text-slate-500 mt-3 md:text-lg">${content.desc}</p>
                    </header>
                    <section>
                        ${content.render()}
                    </section>
                </div>
            `;

            if (content.onRender) setTimeout(content.onRender, 50);
        }

        function toggleAcc(contentId, iconId) {
            const el = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                icon.textContent = '▲';
            } else {
                el.classList.add('hidden');
                icon.textContent = '▼';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderNav();
            navigateTo('intro');
        });
    </script>
</body>
</html>
